<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alle ratings Smash '70</title>
  <style>
  *, *::before, *::after {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
  }

  body {
    display: grid;
    place-items: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(rgba(10, 30, 60, 0.85), rgba(10, 30, 60, 0.85)),
                url('https://smash70.com/wp-content/uploads/2024/04/Kidspong-3.jpg') no-repeat center center fixed;
    background-size: cover;
    color: white;
    padding: 1.5rem;
  }

  .title {
    text-align: center;
    font-size: clamp(2rem, 3vh, 3rem);
    font-weight: 800;
    margin-bottom: 1rem;
  }

  .table-container {
    width: 100%;
    max-width: 1000px;
    height: 80vh;
    background: rgba(0, 0, 0, 0.4);
    padding: 0.8rem;
    border-radius: 12px;
    display: flex;
    align-items: center;
  }

  table {
    width: 100%;
    height: 100%;
    border-collapse: collapse;
    font-size: clamp(0.8rem, 1.4vh, 1.2rem);
    color: white;
  }

  th, td {
    padding: 0.4rem 0.5rem;
    text-align: left;
  }

  th {
    font-weight: 700;
    font-size: 1.05em;
    border-bottom: 2px solid white;
    position: sticky;
    top: 0;
    background: rgba(10, 30, 60, 0.95);
  }

  td {
    border-bottom: 1px solid rgba(255, 255, 255, 0.15);
  }

  tbody tr:hover {
    background-color: rgba(255, 255, 255, 0.08);
  }

  .improvement {
    color: #00ff88;
    font-weight: bold;
  }

  .decline {
    color: #ff6b6b;
    font-weight: bold;
  }

  .footer-note {
    margin-top: 1rem;
    font-size: 0.8rem;
    color: rgba(255, 255, 255, 0.7);
    text-align: center;
    font-style: italic;
  }

  .footer-note a {
    color: rgba(200, 220, 255, 0.9);
    text-decoration: underline;
  }

  @media (max-width: 768px) {
    .title { font-size: 1.5rem; }
    th, td { padding: 0.25rem 0.3rem; }
  }
</style>
</head>
<body>
  <div class="title">Alle ratingwijzigingen Smash '70</div>
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Naam</th>
          <th>Huidige rating</th>
          <th>Verschil</th>
        </tr>
      </thead>
      <tbody>
            <tr>
              <td>Nolan Givone</td>
              <td>2401</td>
              <td class="improvement">+0</td>
            </tr>
            <tr>
              <td>Lukas Bosbach</td>
              <td>2391</td>
              <td class="improvement">+0</td>
            </tr>
            <tr>
              <td>Brent Ronde</td>
              <td>2343</td>
              <td class="improvement">+0</td>
            </tr>
            <tr>
              <td>Chris Verwoert</td>
              <td>2148</td>
              <td class="improvement">+0</td>
            </tr>
      </tbody>
    </table>
  </div>
  <div class="footer-note">
    Alle spelers gesorteerd op dalende rating. Bron:
    <a href="https://nttb-ranglijsten.nl" target="_blank">nttb-ranglijsten.nl</a>
  </div>
</body>
</html>
